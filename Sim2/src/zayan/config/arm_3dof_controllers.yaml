# config/ros2_control_params.yaml

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Declare all controllers we want to load
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: position_controllers/JointGroupPositionController

    gripper_controller:
      type: position_controllers/JointGroupPositionController

# -----------------------------------
# Joint State Broadcaster
# (publishes all joints on /joint_states)
# -----------------------------------
joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - gripper_base_joint
      - gripper_joint
    # Optional, reduce noise
    state_interfaces:
      - position
      - velocity

# -----------------------------------
# Arm position controller
# (drives joint1..joint3)
# -----------------------------------
arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3

# -----------------------------------
# Gripper position controller
# -----------------------------------
gripper_controller:
  ros__parameters:
    joints:
      - gripper_joint